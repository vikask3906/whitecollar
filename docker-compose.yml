version: "3.9"

services:
  # ─── PostgreSQL + PostGIS ────────────────────────────────────────────────────
  db:
    image: postgis/postgis:15-3.3
    container_name: adrc_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: adrc_user
      POSTGRES_PASSWORD: adrc_pass
      POSTGRES_DB: adrc_db
    ports:
      - "5432:5432"
    volumes:
      - adrc_pgdata:/var/lib/postgresql/data
      # init.sql runs automatically on first boot (empty volume)
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adrc_user -d adrc_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── pgAdmin 4 (optional — DB browser UI) ────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: adrc_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@adrc.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - adrc_pgadmin_data:/var/lib/pgadmin

volumes:
  adrc_pgdata:
  adrc_pgadmin_data:
